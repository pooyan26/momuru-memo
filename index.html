<script>
/* ===== Audio（1回だけ作って使い回す） ===== */
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playBeep(freq = 600, duration = 0.08){
  const ctx = getAudioCtx();
  if(ctx.state === "suspended") ctx.resume();

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";
  osc.frequency.value = freq;

  osc.connect(gain);
  gain.connect(ctx.destination);

  gain.gain.setValueAtTime(0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

  osc.start();
  osc.stop(ctx.currentTime + duration);
}

/* 紙っぽい「サラッ」音 */
function playPaperSound(type = "flip"){
  const ctx = getAudioCtx();
  if(ctx.state === "suspended") ctx.resume();

  const duration = (type === "flip") ? 0.13 : 0.16;

  const bufferSize = Math.floor(ctx.sampleRate * duration);
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);

  for(let i=0;i<bufferSize;i++){
    const t = i / bufferSize;
    const envelope = (type === "flip") ? (1 - t) * (1 - t) : t * (1 - t);
    data[i] = (Math.random()*2 - 1) * 0.35 * envelope;
  }

  const src = ctx.createBufferSource();
  src.buffer = buffer;

 const filter = ctx.createBiquadFilter();
filter.type = "lowpass";

// back と同じ方向の音質にして、flipだけ少しだけ明るくする
filter.frequency.value = (type === "flip") ? 1800 : 1400;
filter.Q.value = 0.7; // 少しだけ輪郭（強すぎると不自然）


  const gain = ctx.createGain();
  gain.gain.value = 0.30;

  src.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);

  src.start();
}

shareBtn.addEventListener("contextmenu", (e)=>{

(e)=>{
 e.preventDefault();

clearListBtn.addEventListener("touchstart",
(e)=>{
e.preventDefault();
}, { passive:false });

 clearListBtn.addEventListener("contextmenu",
(e)=>{
e.preventDefault();
});

 let clearListTimer = null;
let startX = 0;
let startY = 0;

const CLEAR_LIST_HOLD_MS = 700;
const CLEAR_LIST_MOVE_CANCEL_PX = 16;

clearListBtn.addEventListener("pointerdown", (e)=>{

e.preventDefault();
e.stopPropagation();

  startX = e.clientX;
  startY = e.clientY;

  clearListBtn.classList.add("holding");

  clearListTimer = setTimeout(()=>{
    listEl.innerHTML = "";
    updateItemCount();
    saveAll();

    if(navigator.vibrate) navigator.vibrate([30, 40, 30]);

showToast("すべて削除しました");
playBeep(300, 0.08);

clearListBtn.style.transform = "scale(1.1)";
setTimeout(()=>{
  clearListBtn.style.transform = "";
}, 120);


    clearListBtn.classList.remove("holding");
    clearListTimer = null;
  }, CLEAR_LIST_HOLD_MS);
});

clearListBtn.addEventListener("pointermove", (e)=>{
  if(!clearListTimer) return;

  const dx = e.clientX - startX;
  const dy = e.clientY - startY;

  if(Math.hypot(dx, dy) > CLEAR_LIST_MOVE_CANCEL_PX){
    clearTimeout(clearListTimer);
    clearListTimer = null;
    clearListBtn.classList.remove("holding");
  }
});

["pointerup","pointercancel","pointerleave"].forEach(ev=>{
  clearListBtn.addEventListener(ev, (e)=>{
   e.preventDefault();

    if(clearListTimer){
      clearTimeout(clearListTimer);
      clearListTimer = null;
    }
    clearListBtn.classList.remove("holding");
  });
});

  const paperBase= document.getElementById("paperBase");

  const scoreBox  = document.getElementById("scoreBox");
const HOLD_BTN_MS = 150;

function setupHoldButton(btn, action){
  let timer = null;
  let startX = 0;
  let startY = 0;
  const CANCEL_MOVE_PX = 12;

  function cancel(){
    if(timer) clearTimeout(timer);
    timer = null;
    btn.classList.remove("holdingBtn");
  }

  btn.addEventListener("pointerdown", (e)=>{
    if(btn.disabled) return;

    e.preventDefault();
    startX = e.clientX;
    startY = e.clientY;
    btn.classList.add("holdingBtn");

    timer = setTimeout(()=>{
      btn.classList.remove("holdingBtn");
      timer = null;
      action();
    }, HOLD_BTN_MS);

  });

  btn.addEventListener("pointermove", (e)=>{
    if(!timer) return;

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if(Math.hypot(dx, dy) > CANCEL_MOVE_PX){
      cancel();
    }
  });

  ["pointerup","pointercancel","pointerleave"].forEach(ev=>{
    btn.addEventListener(ev, cancel);
  });
}

  const KEY = "bearMemo_v1";
 const START_KEY = "bearMemo_startDate";

function initStartDate(){
  const start = localStorage.getItem(START_KEY);
 
 document.getElementById("startDate").innerText = start ? "開始: " + start : "";
} 

function ensureStartDate(){
  let start = localStorage.getItem(START_KEY);
  if(start) return;

  const now = new Date();
  start =
    now.getFullYear() + "/" +
    String(now.getMonth()+1).padStart(2,"0") + "/" +
    String(now.getDate()).padStart(2,"0");

  localStorage.setItem(START_KEY, start);
  document.getElementById("startDate").innerText = "開始: " + start;
}

function setState(flipped){
  const before = paper.classList.contains("flip");
  if(before === flipped) return;

  // まず手なしは消す
  stage.classList.remove("bearNoHandOn");

  if(flipped){
    // めくり中は手あり
    stage.classList.add("bearHandOn");
  }else{
    // 戻す時も最初は手あり
   stage.classList.remove("bearNoHandOn");
    stage.classList.add("bearHandOn");

 setTimeout(()=>{
if(!paper.classList.contains("flip")){
stage.classList.remove("bearHandOn");
}
}, 120);
  }

  paper.classList.toggle("flip", flipped);
  shopEl.disabled = flipped;

  if(before !== flipped){
    playPaperSound(flipped ? "flip" : "back");
  }
}
paper.addEventListener("transitionend", (e)=>{
  if(e.propertyName !== "transform") return;

  const flipped = paper.classList.contains("flip");

  if(flipped){
    // 完全にめくれた後だけ手なし
    stage.classList.remove("bearHandOn");
    stage.classList.add("bearNoHandOn");
  }else{
    // 完全に戻ったら通常
    stage.classList.remove("bearHandOn");
    stage.classList.remove("bearNoHandOn");
  }
});






/* ===== 画面端〜端でめくる（stageで拾う：touch版・確実） ===== */
let sY = 0;
let sX = 0;
let dragging = false;
let touchBlocked = false;

const FLIP_LEFT_PX = 80;

function blockedAtPoint(x, y){

  if(x <= FLIP_LEFT_PX) return false;

  const el = document.elementFromPoint(x, y);
  return !!(el && el.closest("textarea, #paper, #paperBase, #panel, #scoreBox, #scoreText, button, #list"));
}

stage.addEventListener("touchstart", (e)=>{
  const t = e.touches[0];

  touchBlocked = blockedAtPoint(t.clientX, t.clientY);
  if(touchBlocked) return;   // ★ preventDefaultしない！

  sY = t.clientY;
  sX = t.clientX;
  dragging = false;
}, { passive:true });         // ★ passive:true でOK




stage.addEventListener("touchmove", (e)=>{
  if(touchBlocked) return;

  const t = e.touches[0];
  const dy = t.clientY - sY;
  const dx = t.clientX - sX;

  if(Math.abs(dy) > 10 && Math.abs(dx) < 140){
    dragging = true;
    if(document.activeElement && document.activeElement.tagName === "TEXTAREA"){
      document.activeElement.blur();
    }
    e.preventDefault();
  }
}, { passive:false });


stage.addEventListener("touchend", (e)=>{
  if(touchBlocked){ touchBlocked = false; return; }

  if(!dragging) return;
  const t = e.changedTouches[0];
  const dy = t.clientY - sY;

  const flipped = paper.classList.contains("flip");
  if(dy < -20 && !flipped) setState(true);
  if(dy >  20 &&  flipped) setState(false);
}, { passive:true });

stage.addEventListener("touchcancel", ()=>{
  touchBlocked = false;
  dragging = false;
}, { passive:true });




  /* ===== 画面端〜端でめくる（stageで拾う：pointer版のみ） ===== */

   updateItemCount();

shopEl.value = "";

/* ===== スコア（○× + undo） ===== */
let total = 0;
let correct = 0;
let lastAnswer = null;
let prevRate = 0;

// ===== バイブ制御（長押し中は鳴らさない）=====

function vibrate10(){
  if(vibeLock) return;
  if(navigator.vibrate) navigator.vibrate(10);
}

function updateScore(){
  const rate = total > 0 ? Math.round((correct / total) * 100) : 0;

  scoreText.innerText = `${correct}件 / ${total}件（${rate}%）`;
  undoBtn.disabled = (lastAnswer === null);

  scoreText.classList.remove("good","gold");

  if(rate >= 90){
    scoreText.classList.add("gold");
  }else if(rate >= 70){
    scoreText.classList.add("good");
  }

  if(rate >= 90 && prevRate < 90){
    scoreText.classList.add("bigpop");
    setTimeout(()=> scoreText.classList.remove("bigpop"), 350);
    playBeep(900, 0.12);
  }else if(rate >= 70 && prevRate < 70){
    scoreText.classList.add("pop");
    setTimeout(()=> scoreText.classList.remove("pop"), 280);
    playBeep(760, 0.08);
  }

  prevRate = rate;
}

function flashOk(){
  okBtn.classList.add("flash");
  setTimeout(()=> okBtn.classList.remove("flash"), 250);
}

window.checkAnswer = (isCorrect) => {
 ensureStartDate();
  vibrate10();

  lastAnswer = isCorrect;
  total++;

  if(isCorrect){
    correct++;
    flashOk();
    playBeep(700, 0.05);
    
    showBearSpeech("やるじゃない！"）;

setTimeout(()=>{
  playBeep(1100, 0.06);
}, 40);
  }else{
    playBeep(350, 0.07);

    showBearSpeech("気にするな”）；
  }

  updateScore();
 saveAll();
};

window.undoAnswer = () => {
  if(lastAnswer === null) return;

  vibrate10();
  playBeep(520, 0.05);

  total--;
  if(lastAnswer) correct--;
  lastAnswer = null;
  updateScore();
  saveAll();
};

let scoreResetTimer = null;
let myVibeTimer = null;

let holdStartX = 0, holdStartY = 0;
const CANCEL_MOVE_PX = 12;

const MY_VIBE_PATTERN = [20, 40, 20]; // 合計80ms
const MY_VIBE_TOTAL = MY_VIBE_PATTERN.reduce((a,b)=>a+b,0);

// OSのブルッが来る体感に合わせて調整（だいたい500〜600ms付近）
const MY_VIBE_START_MS = 650;   // 自前バイブを鳴らすタイミング
const RESET_AFTER_MYVIBE_MS = 40; // 自前バイブ後、少し余韻を置いて初期化

scoreBox.addEventListener("pointerdown", (e)=>{
 holdStartX = e.clientX;
 holdStartY = e.clientY;
  if(e.target.closest("button")) return;

  e.preventDefault();
  vibeLock = true;                 // 長押し中は他のvibrate10を止める
  scoreBox.classList.add("holdingScore");

  // ① 自前バイブ（OSバイブの「後」に来るように）
  myVibeTimer = setTimeout(()=>{
    if(navigator.vibrate) navigator.vibrate(MY_VIBE_PATTERN);
  }, MY_VIBE_START_MS);

  // ② 初期化（自前バイブの“最後”あたりで）
  scoreResetTimer = setTimeout(()=>{
    total = 0;
    correct = 0;
    lastAnswer = null;
    prevRate = 0;

   localStorage.removeItem(START_KEY);
  
document.getElementById("startDate").innerText = "";

    updateScore();
    saveAll();
    playBeep(400, 0.08);
    cancelScoreReset();
  }, MY_VIBE_START_MS + MY_VIBE_TOTAL + RESET_AFTER_MYVIBE_MS);
});

function cancelScoreReset(){
  if(scoreResetTimer) clearTimeout(scoreResetTimer);
  if(myVibeTimer) clearTimeout(myVibeTimer);
  scoreResetTimer = null;
  myVibeTimer = null;
  scoreBox.classList.remove("holdingScore");
  vibeLock = false;
}

["pointerup","pointercancel","pointerleave"].forEach(ev=>{
  scoreBox.addEventListener(ev, cancelScoreReset);
});


scoreBox.addEventListener("pointermove", (e)=>{
  if(!scoreResetTimer) return;

  const dx = e.clientX - holdStartX;
  const dy = e.clientY - holdStartY;

  if(Math.hypot(dx, dy) > CANCEL_MOVE_PX){
    cancelScoreReset();
  }
});


updateScore();


// ===== 自動保存（localStorage）=====
function saveAll(){
  const data = {
    shop: shopEl.value,
    items: itemEl.value,
    list: Array.from(listEl.querySelectorAll(".item")).map(row => ({
      shop: row.dataset.shop || "",
      items: row.dataset.items || "",
      date: row.dataset.date || ""
    })),
    score: { total, correct, lastAnswer, prevRate }
  };
  localStorage.setItem(KEY, JSON.stringify(data));
}

function loadAll(){
  const raw = localStorage.getItem(KEY);
  if(!raw) return;
  try{
    const data = JSON.parse(raw);

    shopEl.value = data.shop || "";
    itemEl.value = data.items || "";

    // リスト復元
    listEl.innerHTML = "";
    (data.list || []).forEach(obj => {
      const div = document.createElement("div");
      div.className = "item";
      div.dataset.shop = obj.shop || "";
      div.dataset.items = obj.items || "";
      div.dataset.date = obj.date || "";
      div.innerHTML = `
        <span class="left"><b>${escapeHtml(div.dataset.shop)}</b></span>
        <span class="meta">${div.dataset.date}</span>
        <button class="delBtn" type="button">×</button>`;
      listEl.appendChild(div);
    });

    // スコア復元
    if(data.score){
      total = data.score.total || 0;
      correct = data.score.correct || 0;
      lastAnswer = (data.score.lastAnswer ?? null);
      prevRate = data.score.prevRate || 0;
    }

    updateScore();
  }catch(e){
    // 壊れてたら無視
  }
}

loadAll();
updateScore();
initStartDate();
updateItemCount();
updateItemPreviewCount();
});
